<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Sense | User Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">Spend Sense 💸</span>
            <a class="btn btn-outline-primary" href="admin.html">Admin Panel</a>
        </div>
    </nav>

    <main class="container">
        <section class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm mb-4">
                    <h4>Add Expense</h4>
                    <form id="expenseForm" novalidate>
                        
                        <div class="mb-2">
                            <label>Category</label>
                            <select id="category" class="form-select">
                                <option value="">Select...</option>
                                <option value="Food">Food</option>
                                <option value="Education">Education</option>
                                <option value="Transport">Transport</option>
                                <option value="Entertainment">Entertainment</option>
                            </select>
                            <span class="text-danger small d-none" id="categoryErr">Category is required.</span>
                        </div>

                        <div class="mb-2">
                            <label>Title</label>
                            <input type="text" id="title" class="form-control">
                            <span class="text-danger small d-none" id="titleErr">Title is required.</span>
                        </div>
                        
                        <div class="mb-2">
                            <label>Amount (Rs.)</label>
                            <input type="number" id="amount" class="form-control">
                            <span class="text-danger small d-none" id="amountErr">Valid amount required.</span>
                        </div>
                        
                        <div class="mb-2">
                            <label>Date</label>
                            <input type="date" id="date" class="form-control">
                            <span class="text-danger small d-none" id="dateErr">Date is required.</span>
                        </div>
                        
                        <div class="mb-3">
                            <label>Payment Method</label>
                            <select id="method" class="form-select">
                                <option value="">Select...</option>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                            </select>
                            <span class="text-danger small d-none" id="methodErr">Method required.</span>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Add to Ledger</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-3 text-white">
                    <h4 class="text-dark">Recent Transactions</h4>
                    <select id="filterCategory" class="form-select w-auto">
                        <option value="All">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Education">Education</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                </div>
                
                <div id="loadingState" class="text-center text-primary my-3 d-none">
                    <div class="spinner-border" role="status"></div>
                    <p>Loading expenses...</p>
                </div>
                <div id="errorState" class="alert alert-danger d-none">Failed to connect to JSON Server.</div>
                
                <div id="expenseList" class="list-group shadow-sm"></div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
