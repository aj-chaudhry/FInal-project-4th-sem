<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Sense | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">Spend Sense 🛠️ ADMIN</span>
            <a class="btn btn-outline-light" href="index.html">Back to User Panel</a>
        </div>
    </nav>

    <main class="container">
        <div class="row text-center mb-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white p-3 shadow-sm mb-3">
                    <h5>Total Expenses</h5>
                    <h2 id="statCount">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-danger text-white p-3 shadow-sm mb-3">
                    <h5>Total Amount Spent</h5>
                    <h2 id="statTotal">Rs. 0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white p-3 shadow-sm mb-3">
                    <h5>Average Expense</h5>
                    <h2 id="statAvg">Rs. 0</h2>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-4 text-dark">
            <h4 class="mb-3">Manage Records</h4>
            <div id="adminError" class="alert alert-danger d-none">Error communicating with server.</div>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Amount</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="editSection" class="card shadow-sm p-4 mt-4 d-none border-warning text-dark">
            <h4>Edit Resource</h4>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="row g-2">
                    <div class="col-md-3">
                        <input type="text" id="editTitle" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="editAmount" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <select id="editCategory" class="form-select" required>
                            <option value="Food">Food</option>
                            <option value="Education">Education</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-warning w-100">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <script src="admin.js"></script>
</body>
</html>
